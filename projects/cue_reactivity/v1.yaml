screening:
  abstract:
    model: "gpt-5-mini-2025-08-07"
    objective: "Meta-analysis of fMRI studies of drug and natural reward-related cue-reactivity using visual stimuli."
    inclusion_criteria:
      - English language empirical studies with original data
      - Functional MRI scan conducted while human participants assessing drug or natural reward-related cue-reactivity using visual stimuli
    exclusion_criteria:
      - Systematic reviews or meta-analyses
      - Cue-reactivity using only other sensory cues (e.g., gustatory, olfactory, tactile)
    confidence_reporting: true

  fulltext:
    model: "gpt-5-mini-2025-08-07"
    confidence_reporting: true
    objective: "Meta-analysis of fMRI studies of drug and natural reward-related cue-reactivity using visual stimuli."
    inclusion_criteria:
      - Functional MRI study assesing drug or natural reward-related cue-reactivity using visual stimuli
      - At least one analysis involving a within-participant contrast of drug cues>control stimuli or natural reward-related cues>control stimuli
      - Whole-brain evidence- At least one analysis must be a group-level, whole-brain (voxelwise) task-evoked statistical map 
      - It is acceptable for qualifying whole-brain results to be reported in tables of coordinates, figures, or supplementary materials, as long as they are clearly described in the text.
      - Relevant information was reported regarding participant age and sex, cue type (i.e., nicotine, alcohol, cannabis, cocaine, heroin, food, or sexual), MRI scanner field strength, and processing software (e.g., AFNI, FSL, SPM).
    exclusion_criteria:
      - Studies that report only region-of-interest (ROI) analyses with no whole-brain results.
      - Studies that report only seed-based connectivity, effective connectivity (e.g., PPI, DCM), or resting-state analyses (e.g., ICA, PLE, Hurst exponents) without also reporting a whole-brain task activation map.
      - Studies that report only between-group contrasts or interactions (e.g., subgroup vs subgroup, patient vs control) without an accompanying unmasked, whole-brain task effect.
      - Non-empirical papers (e.g., reviews, meta-analyses, methods-only, simulations) without original fMRI data in healthy adults.

