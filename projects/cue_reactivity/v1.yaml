  query: '(((cue reactiv*[tiab] OR cue-induced*[tiab] OR cue-induc*[tiab] OR cue-related*[tiab] OR "drug cue*"[tiab] OR "smoking cue*"[tiab] OR "alcohol cue*"[tiab] OR "food cue*"[tiab] OR "sexual cue*"[tiab] OR "erotic cue*"[tiab] OR "reward cue*"[tiab] OR "appetitive cue*"[tiab] OR "incentive salience"[tiab] OR craving[tiab] OR cravings[tiab] OR urge[tiab] OR urges[tiab]) OR ((cue[tiab] OR cues[tiab] OR cued[tiab] OR cueing[tiab]) AND (crav*[tiab] OR urge*[tiab] OR induc*[tiab] OR react*[tiab] OR reward*[tiab] OR appetit*[tiab]))) AND (Substance-Related Disorders[mh] OR Tobacco Use Disorder[mh] OR Smoking[mh] OR Alcohol-Related Disorders[mh] OR Cocaine-Related Disorders[mh] OR Opioid-Related Disorders[mh] OR Cannabis[mh] OR Marijuana Abuse[mh] OR nicotine[tiab] OR smoking[tiab] OR tobacco[tiab] OR cigarette*[tiab] OR alcohol[tiab] OR ethanol[tiab] OR "alcohol use disorder"[tiab] OR AUD[tiab] OR cocaine[tiab] OR crack[tiab] OR cannabis[tiab] OR marijuana[tiab] OR heroin[tiab] OR opioid*[tiab] OR opiate*[tiab] OR morphine[tiab] OR "Feeding Behavior"[mh] OR appetite[mh] OR "food craving*"[tiab] OR "Sexual Behavior"[mh] OR erotica[tiab]) AND Humans[mh] AND ((Magnetic Resonance Imaging, Functional[mh] OR fMRI[tiab] OR "functional MRI"[tiab] OR "functional magnetic resonance imaging"[tiab] OR BOLD[tiab] OR "blood oxygenation level dependent"[tiab] OR neuroimaging[tiab]) OR ("Meta-Analysis"[pt] OR meta-analy*[tiab] OR "Activation Likelihood Estimation"[tiab] OR ALE[tiab] OR GingerALE[tiab])))'
  date_from: "1995/01/01"
  date_to: "2020/08/31"
  
